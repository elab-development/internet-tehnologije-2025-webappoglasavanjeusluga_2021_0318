version: "3.9"

services:
  db:
    image: postgres:16
    container_name: usluge-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: usluge
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
